train_dataset_config: configs/train_txt/text_hr_512_dataset.txt
suffix: '_text_codsr_ragp_only'

# Evaluation is disabled by inference_steps: 1 because the code checks
# global_step % inference_steps == 1. Use saved checkpoints for explicit
# validation with inference_vosr_onestep.py.
test_lq_dir: /data/ywk/datasets/real_test/LQ
test_gt_dir: /data/ywk/datasets/real_test/HR
test_upscale: 4

infer_steps: 1
resolution: 512

# Distillation keeps teacher + student in memory, so use conservative batch.
train_batch_size: 4
gradient_accumulation_steps: 4
dataloader_num_workers: 2
dataloader_pin_memory: False
dataloader_persistent_workers: False
dataloader_prefetch_factor: 2

# Model configuration
patch_size: 2
mlp_ratio: 4
use_qknorm: True
use_swiglu: True
use_rope: True
use_rmsnorm: True
wo_shift: False

dim: 1024
depth: 28
num_heads: 16

# bitsandbytes in this environment reported no GPU support.
use_8bit_adam: False

# AE
ae_type: sd2
ae_path: preset/ckpts/stable-diffusion-2-1-base
lwdecoder_path: preset/ckpts/sd21_lwdecoder.pth

# Training configuration
learning_rate: 5.0e-6
max_train_steps: 20000
checkpointing_steps: 1000
inference_steps: 1
adam_beta1: 0.9
adam_beta2: 0.95
adam_weight_decay: 1.0e-2
adam_epsilon: 1.0e-08
max_grad_norm: 1.0
lr_scheduler: constant_with_warmup
lr_warmup_steps: 0
lr_num_cycles: 1

use_ema: True
mixed_precision: bf16
tracker_project_name: vosr_text_0.5B_codsr_ragp_only
seed: 42
ema_decay: 0.9999

time_dist: ['uniform', 0, 1.0]

cfg_ratio: 0.1
cfg_scale: 0.5

teacher_ckpt: exp_vosr_text/ldit_fm_bs008_sd2f8c4_size512_ps2_d1024_b28_h16_cfgs0.5-r0.1-wc0.05-0.25_edr3_tduni_typetxt_text_hr/checkpoints/checkpoint-00040000/clean_weights/ema_model.safetensors

weak_cond_strength_aelq: 0.1
weak_cond_strength_aelq_list: [0.05, 0.25]
cond_strength_aelq_list: [5, 1]

dinov2_size: 448
enc_type: dinov2b
enc_dim: 768
layer_dinov2b_list: [8]

interp_type: lin

u_weight: 1.0
a: 1.0
b: 1.0

use_pos: False
train_steps: 2
encdim_ratio: 3

# CODSR-inspired text-SR modifications
use_codsr_ragp: True
use_lq_token_modulation: False
lq_mod_downscale_factor: 8
ragp_infer_cond_strength: 0.993
t_start: 0
t_end: 1
resume_ckpt: ~
pretrained_ckpt: exp_vosr_text/ldit_fm_bs008_sd2f8c4_size512_ps2_d1024_b28_h16_cfgs0.5-r0.1-wc0.05-0.25_edr3_tduni_typetxt_text_hr/checkpoints/checkpoint-00040000/clean_weights/ema_model.safetensors
distill_type: rcgm

# logging
logging_dir: logs
output_dir: exp_vosr_text_codsr/
report_to: tensorboard
log_loss_steps: 10

dataset_type: 'txt'
shuffle_buffer: 2000
