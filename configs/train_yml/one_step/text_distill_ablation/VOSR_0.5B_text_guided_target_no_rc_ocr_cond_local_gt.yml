train_dataset_config: configs/train_txt/text_hr_512_dataset.txt
suffix: '_text_ablation_guided_target_no_rc_ocr_cond_local_gt'

test_lq_dir: /data/ywk/datasets/real_test/LQ
test_gt_dir: /data/ywk/datasets/real_test/HR
test_upscale: 4

infer_steps: 1
resolution: 512

train_batch_size: 4
gradient_accumulation_steps: 4
dataloader_num_workers: 2
dataloader_pin_memory: False
dataloader_persistent_workers: False
dataloader_prefetch_factor: 2

patch_size: 2
mlp_ratio: 4
use_qknorm: True
use_swiglu: True
use_rope: True
use_rmsnorm: True
wo_shift: False

dim: 1024
depth: 28
num_heads: 16
use_8bit_adam: False

ae_type: sd2
ae_path: preset/ckpts/stable-diffusion-2-1-base
lwdecoder_path: preset/ckpts/sd21_lwdecoder.pth

learning_rate: 5.0e-6
max_train_steps: 20000
checkpointing_steps: 1000
inference_steps: 1
adam_beta1: 0.9
adam_beta2: 0.95
adam_weight_decay: 1.0e-2
adam_epsilon: 1.0e-08
max_grad_norm: 1.0
lr_scheduler: constant_with_warmup
lr_warmup_steps: 0
lr_num_cycles: 1

use_ema: True
mixed_precision: bf16
tracker_project_name: vosr_text_0.5B_distill_ablation_guided_target_no_rc_ocr_cond_local_gt
seed: 42
ema_decay: 0.9999

time_dist: ['uniform', 0, 1.0]

cfg_ratio: 0.0
cfg_scale: 0.5

teacher_ckpt: exp_vosr_text/ldit_fm_bs008_sd2f8c4_size512_ps2_d1024_b28_h16_cfgs0.5-r0.1-wc0.05-0.25_edr3_tduni_typetxt_text_hr/checkpoints/checkpoint-00040000/clean_weights/ema_model.safetensors
pretrained_ckpt: exp_vosr_text/ldit_fm_bs008_sd2f8c4_size512_ps2_d1024_b28_h16_cfgs0.5-r0.1-wc0.05-0.25_edr3_tduni_typetxt_text_hr/checkpoints/checkpoint-00040000/clean_weights/ema_model.safetensors

weak_cond_strength_aelq: 0.1
weak_cond_strength_aelq_list: [0.05, 0.25]
cond_strength_aelq_list: [5, 1]

dinov2_size: 448
enc_type: dinov2b
enc_dim: 768
layer_dinov2b_list: [8]

interp_type: lin

u_weight: 0.0
a: 1.0
b: 1.0

use_pos: False
train_steps: 2
encdim_ratio: 3
t_start: 0
t_end: 1
resume_ckpt: ~
distill_type: shortcut

# Gradient-checkpoint the student DiT blocks (see ocr_local_repa.yml) so the
# full-512 VAE decode for the OCR loss fits a 24GB GPU at per-GPU batch 1.
use_checkpoint: True

# Local-crop OCR-REPA with GROUND-TRUTH boxes (experiment 2a-GT). Identical to
# ocr_local_repa.yml except the text boxes come from the dataset annotations
# (restoration_dataset.json, pre-indexed) instead of the online DBNet detector.
# This is the only changed variable vs the online-detection 2a, giving a clean
# detector-vs-GT ablation. The dataloader maps each image's GT boxes through the
# same RandomCrop used for the HR, and OCRRepaSystem.compute_loss skips detection
# when boxes are provided.
ocr_use_gt_boxes: True
ocr_boxes_index_path: preset/text_boxes_index.pkl

ocr_repa_weight: 0.5
ocr_repa_interval: 1
ocr_repa_start_step: 0
ocr_repa_on_sync_only: True
ocr_repa_rec_algorithm: CRNN
ocr_repa_rec_image_shape: "3,32,320"
ocr_repa_max_boxes: 16
ocr_repa_min_box_size: 8
ocr_repa_loss_type: cosine

logging_dir: logs
output_dir: exp_vosr_text_distill_ablation/
report_to: tensorboard
log_loss_steps: 10

dataset_type: 'txt'
shuffle_buffer: 2000

# COMBO experiment: OCR condition injection (input-side prior, kept at
# inference) on top of 2a-GT local-crop OCR-REPA (output-side train-only
# supervision). Identical to ocr_local_gt.yml plus the use_ocr_cond block,
# so the delta vs 2a-GT isolates the injected prior under the local loss.
use_ocr_cond: True
ocr_cond_model: microsoft/trocr-base-printed
ocr_cond_gate_init: 0.0
