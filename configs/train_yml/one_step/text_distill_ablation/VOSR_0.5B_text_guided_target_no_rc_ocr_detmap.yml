test_gt_dir: /data/ywk/datasets/real_test/HR
test_upscale: 4

infer_steps: 1
resolution: 512

train_batch_size: 4
gradient_accumulation_steps: 4
dataloader_num_workers: 2
dataloader_pin_memory: False
dataloader_persistent_workers: False
dataloader_prefetch_factor: 2

patch_size: 2
mlp_ratio: 4
use_qknorm: True
use_swiglu: True
use_rope: True
use_rmsnorm: True
wo_shift: False

dim: 1024
depth: 28
num_heads: 16
use_8bit_adam: False

ae_type: sd2
ae_path: preset/ckpts/stable-diffusion-2-1-base
lwdecoder_path: preset/ckpts/sd21_lwdecoder.pth

learning_rate: 5.0e-6
max_train_steps: 20000
checkpointing_steps: 1000
inference_steps: 1
adam_beta1: 0.9
adam_beta2: 0.95
adam_weight_decay: 1.0e-2
adam_epsilon: 1.0e-08
max_grad_norm: 1.0
lr_scheduler: constant_with_warmup
lr_warmup_steps: 0
lr_num_cycles: 1

use_ema: True
mixed_precision: bf16
tracker_project_name: vosr_text_0.5B_distill_ablation_guided_target_no_rc_ocr_detmap
seed: 42
ema_decay: 0.9999

time_dist: ['uniform', 0, 1.0]

cfg_ratio: 0.0
cfg_scale: 0.5

teacher_ckpt: exp_vosr_text/ldit_fm_bs008_sd2f8c4_size512_ps2_d1024_b28_h16_cfgs0.5-r0.1-wc0.05-0.25_edr3_tduni_typetxt_text_hr/checkpoints/checkpoint-00040000/clean_weights/ema_model.safetensors
pretrained_ckpt: exp_vosr_text/ldit_fm_bs008_sd2f8c4_size512_ps2_d1024_b28_h16_cfgs0.5-r0.1-wc0.05-0.25_edr3_tduni_typetxt_text_hr/checkpoints/checkpoint-00040000/clean_weights/ema_model.safetensors

weak_cond_strength_aelq: 0.1
weak_cond_strength_aelq_list: [0.05, 0.25]
cond_strength_aelq_list: [5, 1]

dinov2_size: 448
enc_type: dinov2b
enc_dim: 768
layer_dinov2b_list: [8]

interp_type: lin

u_weight: 0.0
a: 1.0
b: 1.0

use_pos: False
train_steps: 2
encdim_ratio: 3
t_start: 0
t_end: 1
resume_ckpt: ~
distill_type: shortcut

# Gradient-checkpoint the student DiT blocks. The OCR-REPA loss decodes the
# one-step x0 prediction to a full 512px image (VAE decoder, grad retained for
# backprop), which on top of the resident student graph OOMs a 24GB GPU at the
# per-GPU micro-batch of 1. Checkpointing the DiT blocks frees that resident
# activation memory to make room for the decode. Keeps full resolution.
# checkpoint OFF: the new detmap gradient path conflicts with torch.compile
# (AOT autograd) under non-reentrant gradient checkpointing -> CheckpointError.
# The full-512 decode fits 24GB at per-GPU batch 1 WITHOUT checkpointing, so we
# drop checkpointing and KEEP torch.compile (much faster than the eager fallback).
use_checkpoint: True

# Text detection-response-map consistency (experiment 2c): run the frozen
# PaddleOCR DBNet on both the one-step prediction and the HR image and align their
# sigmoid probability maps (the "detection response map"). Gradients flow only
# through the prediction; the HR map is the detached target. No GT boxes and no
# recognizer crops -- a pixel-level spatial constraint on top of 2a/2b.
# 2a local-crop OCR-REPA is OFF here (single variable: detmap only).
ocr_repa_weight: 0.0
ocr_detmap_weight: 0.5
ocr_detmap_interval: 1
ocr_detmap_start_step: 0
# Compute only on gradient-sync micro-steps (1 of every gradient_accumulation_steps=4),
# same rationale as 2a: cuts the heavy decode+detect work ~4x and scales the
# effective detmap gradient ~4x down so weight 0.5 does not dominate v_loss.
ocr_detmap_on_sync_only: True
# 0 keeps the native 512px decode (already a multiple of 32); l1 over the prob map.
ocr_detmap_size: 0
ocr_detmap_loss_type: l1
# Detector settings (build forced on for detmap). Defaults resolve to
# PaddleOCR2Pytorch/weights/ch_ptocr_server_v2.0_det_infer.pth.
ocr_repa_det_limit_side_len: 512
ocr_repa_det_db_box_thresh: 0.6

logging_dir: logs
output_dir: exp_vosr_text_distill_ablation/
report_to: tensorboard
log_loss_steps: 10

dataset_type: 'txt'
shuffle_buffer: 2000
